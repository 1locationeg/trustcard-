name: Deploy to Hostinger FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build and export (static)
        run: npm run deploy-build

      - name: Upload files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: out/
          server-dir: /
          dangerous-clean-slate: false

      - name: Get FTP File List and Commit
        run: |
          python -c "
          from ftplib import FTP
          try:
              ftp = FTP('${{ secrets.FTP_HOST }}')
              ftp.login('${{ secrets.FTP_USERNAME }}', '${{ secrets.FTP_PASSWORD }}')
              lines = []
              ftp.retrlines('LIST', lines.append)
              
              # Write to a file in the workspace
              with open('ftp_list.txt', 'w') as f:
                  f.write('\n'.join(lines))
              
              ftp.quit()
              print('Successfully wrote ftp_list.txt')
          except Exception as e:
              print('FTP error:', e)
          "
          
          # Commit the file back to main branch
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ftp_list.txt
          if git diff --staged --quiet; then
            echo "No changes in FTP file list"
          else
            git commit -m "chore: update ftp_list.txt with remote files"
            git push origin main
          fi
