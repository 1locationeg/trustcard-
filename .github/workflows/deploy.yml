name: Build and Deploy Static Site

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install Node.js 🔧
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies 📦
        run: npm install

      - name: Build Next.js Static Export 🏗️
        run: npm run build

      - name: Deploy Compiled Assets to Release Branch 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: release # Target branch for static files
          folder: out # Build output folder
          clean: true

      - name: Trigger Hostinger Auto-Deployment Webhook 🌐
        run: |
          curl -X GET https://webhooks.hostinger.com/deploy/fa7e9db9d5f47339a71ca3664d03689d
