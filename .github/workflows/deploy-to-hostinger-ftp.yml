name: Deploy trustcard to Hostinger FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run deploy-build

      - name: Prepare build files
        run: |
          # Remove .htaccess from out/ to prevent FTP upload block by Hostinger
          rm -f out/.htaccess

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: out/
          server-dir: domains/r8estate.com/public_html/trustcard/
          dangerous-clean-slate: false
          state-name: .ftp-deploy-sync-state.json

      - name: Upload and rename .htaccess
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          python -c "
          import ftplib
          import os
          
          host = os.environ.get('FTP_HOST')
          user = os.environ.get('FTP_USERNAME')
          pwd = os.environ.get('FTP_PASSWORD')
          
          print('Connecting to FTP for htaccess configurations...')
          ftp = ftplib.FTP(host)
          ftp.login(user, pwd)
          
          # 1. Update domains/r8estate.com/public_html/trustcard/.htaccess
          print('Navigating to trustcard directory...')
          ftp.cwd('domains/r8estate.com/public_html/trustcard')
          
          htaccess_content = '''DirectoryIndex index.html
          
          <IfModule mod_rewrite.c>
          RewriteEngine Off
          </IfModule>
          '''
          
          with open('temp_htaccess.txt', 'w') as f:
              f.write(htaccess_content)
              
          with open('temp_htaccess.txt', 'rb') as f:
              ftp.storbinary('STOR htaccess.txt', f)
          print('Uploaded trustcard htaccess.txt successfully!')
          
          try:
              ftp.delete('.htaccess')
              print('Deleted old trustcard .htaccess successfully!')
          except Exception as e:
              print('No old trustcard .htaccess deleted:', e)
              
          try:
              ftp.rename('htaccess.txt', '.htaccess')
              print('Successfully renamed trustcard htaccess.txt to .htaccess!')
          except Exception as e:
              print('Failed to rename trustcard htaccess.txt to .htaccess:', e)
              
          # 2. Update domains/r8estate.com/public_html/.htaccess (parent directory exception)
          print('Navigating to parent directory...')
          ftp.cwd('..')
          
          parent_lines = []
          try:
              ftp.retrlines('RETR .htaccess', parent_lines.append)
              parent_content = '\n'.join(parent_lines)
              print('Successfully retrieved parent .htaccess')
              
              exception_cond = 'RewriteCond %{REQUEST_URI} !^/trustcard(/|$)'
              if exception_cond not in parent_content:
                  print('Adding trustcard exception to parent .htaccess...')
                  lines = parent_content.split('\n')
                  new_lines = []
                  added = False
                  for line in lines:
                      # Insert the exception before any RewriteRule leading to index.php
                      if ('index.php' in line or 'RewriteRule ^ index.php' in line) and not added:
                          new_lines.append(f'    {exception_cond}')
                          added = True
                      new_lines.append(line)
                      
                  # If we couldn't find index.php, just insert after RewriteEngine On
                  if not added:
                      new_lines = []
                      for line in lines:
                          new_lines.append(line)
                          if 'RewriteEngine On' in line and not added:
                              new_lines.append(f'    {exception_cond}')
                              added = True
                              
                  parent_content_updated = '\n'.join(new_lines)
                  
                  with open('temp_parent_htaccess.txt', 'w') as f:
                      f.write(parent_content_updated)
                      
                  with open('temp_parent_htaccess.txt', 'rb') as f:
                      ftp.storbinary('STOR htaccess_parent.txt', f)
                      
                  try:
                      ftp.delete('.htaccess')
                  except Exception:
                      pass
                      
                  ftp.rename('htaccess_parent.txt', '.htaccess')
                  print('Successfully updated parent .htaccess with trustcard exception!')
              else:
                  print('trustcard exception already exists in parent .htaccess')
          except Exception as e:
              print('Could not modify parent .htaccess or it does not exist:', e)
              
          ftp.quit()
          "

