name: Deploy to Hostinger FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build and export (static)
        run: npm run deploy-build

      - name: Upload files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: out/
          server-dir: /
          dangerous-clean-slate: false

      - name: Debug FTP File List
        run: |
          python -c "
          from ftplib import FTP
          try:
              ftp = FTP('${{ secrets.FTP_HOST }}')
              ftp.login('${{ secrets.FTP_USERNAME }}', '${{ secrets.FTP_PASSWORD }}')
              lines = []
              ftp.retrlines('LIST', lines.append)
              
              # Write list to file
              with open('ftp_files.txt', 'w') as f:
                  f.write('\n'.join(lines))
              
              # Upload to server root
              with open('ftp_files.txt', 'rb') as f:
                  ftp.storbinary('STOR ftp_files.txt', f)
              
              print('Uploaded ftp_files.txt to FTP server root')
              ftp.quit()
          except Exception as e:
              print('FTP error:', e)
          "
